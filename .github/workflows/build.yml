name: Build site with Bun

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2.1.2
      
    - name: Install dependencies
      run: bun install

    - name: Build static site
      run: bun run build

    - name: Run tests
      run: bun test
